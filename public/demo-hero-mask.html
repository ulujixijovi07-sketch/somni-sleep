<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMNI — Mask Glow Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200..800;1,9..40,200..800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050510;
    font-family: 'DM Sans', sans-serif;
    color: #F5F1EB;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .overlay {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    height: 100%;
    padding: 2rem;
    pointer-events: none;
  }

  .overlay a { pointer-events: auto; }

  .headline {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 1.15;
    color: #F5F1EB;
    max-width: 720px;
  }

  .headline .gold {
    color: #C9A84C;
  }

  .subhead {
    margin-top: 1rem;
    font-size: clamp(0.95rem, 1.8vw, 1.2rem);
    color: rgba(245, 241, 235, 0.7);
    max-width: 500px;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 2.5rem;
    justify-content: center;
  }

  .btn {
    display: inline-block;
    padding: 0.8rem 2rem;
    border-radius: 9999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1.5px solid transparent;
  }

  .btn-primary {
    background: #C9A84C;
    color: #050510;
    border-color: #C9A84C;
  }
  .btn-primary:hover {
    background: #dab74f;
    border-color: #dab74f;
    transform: translateY(-1px);
    box-shadow: 0 0 24px rgba(201, 168, 76, 0.35);
  }

  .btn-outline {
    background: transparent;
    color: #F5F1EB;
    border-color: rgba(245, 241, 235, 0.3);
  }
  .btn-outline:hover {
    border-color: #F5F1EB;
    background: rgba(245, 241, 235, 0.05);
    transform: translateY(-1px);
  }

  .attribution {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: rgba(245, 241, 235, 0.3);
    letter-spacing: 0.05em;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="hero">
  <canvas id="c"></canvas>
  <div class="overlay">
    <h1 class="headline">
      You Don't Have Insomnia.<br>Your <span class="gold">Senses</span> Just Need Reset.
    </h1>
    <p class="subhead">Four pathways to deep sleep. Neuroscience-backed.</p>
    <div class="buttons">
      <a href="#" class="btn btn-primary">Explore the 4 Senses</a>
      <a href="#" class="btn btn-outline">See the Science</a>
    </div>
  </div>
  <div class="attribution">SOMNI</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, dpr;

  const particles = [];
  const PARTICLE_COUNT = 50;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }

  function initParticles() {
    particles.length = 0;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        speed: Math.random() * 0.25 + 0.08,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: Math.random() * 0.01 + 0.003,
        alpha: Math.random() * 0.5 + 0.1
      });
    }
  }

  // Sleep mask path — centered and scaled relative to viewport
  function getMaskPath(scale) {
    const cx = W / 2;
    const cy = H * 0.40;
    const w = scale * 0.85; // half-width scale factor
    const h = scale * 0.55; // half-height scale factor

    const mx = cx;
    const my = cy;

    const p = new Path2D();

    // Start at left strap point
    const lx = mx - w * 1.15;
    const ly = my;

    p.moveTo(lx, ly);

    // Left eye — top curve
    p.bezierCurveTo(
      mx - w * 0.95, my - h * 1.15,  // cp1
      mx - w * 0.35, my - h * 0.75,  // cp2
      mx - w * 0.08, my               // end: bridge start (top)
    );

    // Nose bridge dip (top)
    p.bezierCurveTo(
      mx - w * 0.02, my - h * 0.08,  // cp1
      mx + w * 0.02, my - h * 0.08,  // cp2
      mx + w * 0.08, my               // end: bridge end (top)
    );

    // Right eye — top curve
    p.bezierCurveTo(
      mx + w * 0.35, my - h * 0.75,   // cp1
      mx + w * 0.95, my - h * 1.15,   // cp2
      mx + w * 1.15, my                // end: right strap point
    );

    // Right eye — bottom curve (outer to inner)
    p.bezierCurveTo(
      mx + w * 0.90, my + h * 1.05,   // cp1
      mx + w * 0.40, my + h * 0.55,   // cp2
      mx + w * 0.08, my + h * 0.05    // end: bridge start (bottom)
    );

    // Nose bridge dip (bottom) — deeper dip for nose
    p.bezierCurveTo(
      mx + w * 0.03, my + h * 0.20,   // cp1
      mx - w * 0.03, my + h * 0.20,   // cp2
      mx - w * 0.08, my + h * 0.05    // end: bridge end (bottom)
    );

    // Left eye — bottom curve (inner to outer)
    p.bezierCurveTo(
      mx - w * 0.40, my + h * 0.55,   // cp1
      mx - w * 0.90, my + h * 1.05,   // cp2
      lx, ly                            // back to left strap
    );

    p.closePath();
    return p;
  }

  // Subtle secondary glow shapes — two eye ellipses
  function getEyeOvals(scale) {
    const cx = W / 2;
    const cy = H * 0.40;
    const w = scale * 0.85;

    const eyeW = w * 0.28;
    const eyeH = w * 0.16;
    const gap = w * 0.28;

    return [
      { x: cx - gap, y: cy, rx: eyeW, ry: eyeH },
      { x: cx + gap, y: cy, rx: eyeW, ry: eyeH }
    ];
  }

  function drawMask(t) {
    const cx = W / 2;
    const cy = H * 0.40;
    const scale = Math.min(W, H) * 0.35;

    // Pulse animation — slow breathing rhythm
    const pulse = 1 + 0.06 * Math.sin(t * 0.0012);
    const glowIntensity = 0.55 + 0.25 * Math.sin(t * 0.0012);

    // ---- Backlight glow behind the mask ----
    const glowRadius = scale * 1.6 * pulse;
    const backGlow = ctx.createRadialGradient(cx, cy, scale * 0.2, cx, cy, glowRadius);
    backGlow.addColorStop(0, `rgba(201, 168, 76, ${glowIntensity})`);
    backGlow.addColorStop(0.3, `rgba(201, 168, 76, ${glowIntensity * 0.55})`);
    backGlow.addColorStop(0.55, `rgba(201, 168, 76, ${glowIntensity * 0.15})`);
    backGlow.addColorStop(0.8, 'rgba(201, 168, 76, 0.02)');
    backGlow.addColorStop(1, 'rgba(201, 168, 76, 0)');

    ctx.beginPath();
    ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = backGlow;
    ctx.fill();

    // ---- Soft eye-area glows ----
    const eyes = getEyeOvals(scale);
    for (const eye of eyes) {
      const eyeGlow = ctx.createRadialGradient(eye.x, eye.y, eye.rx * 0.2, eye.x, eye.y, eye.rx * 2.2);
      eyeGlow.addColorStop(0, `rgba(201, 168, 76, ${glowIntensity * 0.6})`);
      eyeGlow.addColorStop(0.5, `rgba(201, 168, 76, ${glowIntensity * 0.15})`);
      eyeGlow.addColorStop(1, 'rgba(201, 168, 76, 0)');

      ctx.beginPath();
      ctx.ellipse(eye.x, eye.y, eye.rx * 2.2, eye.ry * 2.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = eyeGlow;
      ctx.fill();
    }

    // ---- Mask shape fill ----
    const maskPath = getMaskPath(scale);

    // Fill — very dark with subtle gold warmth
    const fillGrad = ctx.createLinearGradient(cx, cy - scale * 0.3, cx, cy + scale * 0.3);
    fillGrad.addColorStop(0, '#0A0A1A');
    fillGrad.addColorStop(0.5, '#0D0C18');
    fillGrad.addColorStop(1, '#0A0A1A');

    ctx.fillStyle = fillGrad;
    ctx.fill(maskPath);

    // Edge glow stroke
    ctx.strokeStyle = `rgba(201, 168, 76, ${0.2 + glowIntensity * 0.25})`;
    ctx.lineWidth = 1.2 * pulse;
    ctx.stroke(maskPath);

    // Inner rim light — slightly offset, thinner
    ctx.strokeStyle = `rgba(253, 248, 237, ${0.06 + glowIntensity * 0.08})`;
    ctx.lineWidth = 3;
    ctx.stroke(maskPath);

    // ---- Subtle strap lines ----
    const lx = cx - scale * 0.85 * 1.15;
    const rx = cx + scale * 0.85 * 1.15;
    const strapAlpha = 0.1 + glowIntensity * 0.06;

    ctx.beginPath();
    ctx.moveTo(lx, cy);
    ctx.bezierCurveTo(lx - scale * 0.3, cy - scale * 0.05, lx - scale * 0.8, cy, lx - scale * 1.1, cy);
    ctx.strokeStyle = `rgba(201, 168, 76, ${strapAlpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(rx, cy);
    ctx.bezierCurveTo(rx + scale * 0.3, cy - scale * 0.05, rx + scale * 0.8, cy, rx + scale * 1.1, cy);
    ctx.strokeStyle = `rgba(201, 168, 76, ${strapAlpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawParticles(t) {
    for (const p of particles) {
      p.y -= p.speed;
      p.x += Math.sin(t * p.wobbleSpeed + p.wobble) * 0.3;

      // Reset particle when it drifts off top
      if (p.y < -20) {
        p.y = H + 20;
        p.x = W * 0.2 + Math.random() * W * 0.6;
      }
      // Wrap horizontally
      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 168, 76, ${p.alpha.toFixed(2)})`;
      ctx.fill();
    }
  }

  function draw(timestamp) {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);

    // Subtle vignette
    const vig = ctx.createRadialGradient(W / 2, H * 0.40, Math.min(W, H) * 0.12, W / 2, H * 0.40, Math.max(W, H) * 0.75);
    vig.addColorStop(0, 'rgba(10, 10, 26, 0)');
    vig.addColorStop(1, 'rgba(5, 5, 16, 0.55)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    drawParticles(timestamp);
    drawMask(timestamp);

    requestAnimationFrame(draw);
  }

  resize();
  initParticles();
  requestAnimationFrame(draw);

  window.addEventListener('resize', () => {
    resize();
    initParticles();
  });
})();
</script>

</body>
</html>
