<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMNI — Moon Phase Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200..800;1,9..40,200..800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050510;
    font-family: 'DM Sans', sans-serif;
    color: #F5F1EB;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .overlay {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    height: 100%;
    padding: 2rem;
  }

  .headline {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 1.15;
    color: #F5F1EB;
    max-width: 720px;
  }

  .headline .gold {
    color: #C9A84C;
  }

  .subhead {
    margin-top: 1rem;
    font-size: clamp(0.95rem, 1.8vw, 1.2rem);
    color: rgba(245, 241, 235, 0.7);
    max-width: 500px;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 2.5rem;
    justify-content: center;
  }

  .btn {
    display: inline-block;
    padding: 0.8rem 2rem;
    border-radius: 9999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1.5px solid transparent;
  }

  .btn-primary {
    background: #C9A84C;
    color: #050510;
    border-color: #C9A84C;
  }
  .btn-primary:hover {
    background: #dab74f;
    border-color: #dab74f;
    transform: translateY(-1px);
    box-shadow: 0 0 24px rgba(201, 168, 76, 0.35);
  }

  .btn-outline {
    background: transparent;
    color: #F5F1EB;
    border-color: rgba(245, 241, 235, 0.3);
  }
  .btn-outline:hover {
    border-color: #F5F1EB;
    background: rgba(245, 241, 235, 0.05);
    transform: translateY(-1px);
  }

  .attribution {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: rgba(245, 241, 235, 0.3);
    letter-spacing: 0.05em;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="hero">
  <canvas id="c"></canvas>
  <div class="overlay">
    <h1 class="headline">
      You Don't Have Insomnia.<br>Your <span class="gold">Senses</span> Just Need Reset.
    </h1>
    <p class="subhead">Four pathways to deep sleep. Neuroscience-backed.</p>
    <div class="buttons">
      <a href="#" class="btn btn-primary">Explore the 4 Senses</a>
      <a href="#" class="btn btn-outline">See the Science</a>
    </div>
  </div>
  <div class="attribution">SOMNI</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, dpr;

  const stars = [];
  const STAR_COUNT = 160;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }

  function initStars() {
    stars.length = 0;
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.6 + 0.3,
        speed: Math.random() * 0.008 + 0.002,
        phase: Math.random() * Math.PI * 2,
        amplitude: Math.random() * 0.5 + 0.15
      });
    }
  }

  function drawStars(t) {
    for (const s of stars) {
      const alpha = 0.2 + s.amplitude * (0.5 + 0.5 * Math.sin(t * 0.001 * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245, 241, 235, ${alpha.toFixed(2)})`;
      ctx.fill();
    }
  }

  function drawMoon(t) {
    const cx = W / 2;
    const cy = H * 0.42;
    const radius = Math.min(W, H) * 0.18;

    // Moon phase cycle: about 30 seconds per full cycle
    const cycle = (t * 0.0002) % (Math.PI * 2);
    // phase: 0 = full, PI = new (crescent), goes 0→PI→0
    const phase = Math.PI * (0.5 + 0.5 * Math.sin(cycle));

    // Outer glow — large radial gradient
    const glowGrad = ctx.createRadialGradient(cx, cy, radius * 0.7, cx, cy, radius * 3.2);
    glowGrad.addColorStop(0, 'rgba(201, 168, 76, 0.25)');
    glowGrad.addColorStop(0.35, 'rgba(201, 168, 76, 0.08)');
    glowGrad.addColorStop(0.65, 'rgba(201, 168, 76, 0.02)');
    glowGrad.addColorStop(1, 'rgba(201, 168, 76, 0)');

    ctx.beginPath();
    ctx.arc(cx, cy, radius * 3.2, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // Mid glow
    const midGlow = ctx.createRadialGradient(cx, cy, radius * 0.85, cx, cy, radius * 1.6);
    midGlow.addColorStop(0, 'rgba(201, 168, 76, 0.4)');
    midGlow.addColorStop(0.5, 'rgba(201, 168, 76, 0.1)');
    midGlow.addColorStop(1, 'rgba(201, 168, 76, 0)');

    ctx.beginPath();
    ctx.arc(cx, cy, radius * 1.6, 0, Math.PI * 2);
    ctx.fillStyle = midGlow;
    ctx.fill();

    // Moon body
    const bodyGrad = ctx.createRadialGradient(cx - radius * 0.2, cy - radius * 0.25, radius * 0.1, cx, cy, radius);
    bodyGrad.addColorStop(0, '#FDF8ED');
    bodyGrad.addColorStop(0.6, '#E8D5A0');
    bodyGrad.addColorStop(1, '#C9A84C');

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.clip();

    // Draw full moon base
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Draw shadow disc for crescent effect
    // phase = 0 → shadow fully off (full moon)
    // phase = PI → shadow fully on (new moon → thin crescent)
    const shadowOffset = radius * (2 - Math.cos(phase) * 1.8);
    const shadowAlpha = 0.92;

    const shadowGrad = ctx.createRadialGradient(cx, cy, radius * 0.3, cx + shadowOffset, cy - shadowOffset * 0.15, radius * 1.1);
    shadowGrad.addColorStop(0, 'rgba(5, 5, 16, 0)');
    shadowGrad.addColorStop(0.5, `rgba(5, 5, 16, ${shadowAlpha * 0.5})`);
    shadowGrad.addColorStop(1, `rgba(5, 5, 16, ${shadowAlpha})`);

    ctx.beginPath();
    ctx.arc(cx + shadowOffset, cy - shadowOffset * 0.15, radius * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = shadowGrad;
    ctx.fill();

    ctx.restore();

    // Crisp edge highlight on the lit side
    const arcStart = -Math.PI / 2 + phase;
    const arcEnd = -Math.PI / 2 - phase;

    ctx.beginPath();
    ctx.arc(cx, cy, radius, arcStart, arcEnd, true);
    ctx.strokeStyle = 'rgba(253, 248, 237, 0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function draw(timestamp) {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);

    // Subtle radial vignette from moon area
    const vig = ctx.createRadialGradient(W / 2, H * 0.42, Math.min(W, H) * 0.15, W / 2, H * 0.42, Math.max(W, H) * 0.8);
    vig.addColorStop(0, 'rgba(10, 10, 26, 0)');
    vig.addColorStop(1, 'rgba(5, 5, 16, 0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    drawStars(timestamp);
    drawMoon(timestamp);

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  requestAnimationFrame(draw);

  window.addEventListener('resize', () => {
    resize();
    initStars();
  });
})();
</script>

</body>
</html>
